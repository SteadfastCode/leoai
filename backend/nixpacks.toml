[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "cups", "libdrm", "dbus", "libxkbcommon", "gtk3", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb", "mesa", "expat", "at-spi2-atk", "at-spi2-core", "alsa-lib"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[start]
cmd = "PUPPETEER_EXECUTABLE_PATH=$(which chromium) node index.js"
