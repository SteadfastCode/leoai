<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leo Widget Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }
    body.dark { background: #0f172a; color: #e2e8f0; }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 240px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    body.dark #sidebar { background: #1e293b; border-color: #334155; }
    body.no-sidebar #sidebar { display: none; }

    #sidebar-header {
      padding: 20px 16px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    body.dark #sidebar-header { color: #f1f5f9; border-color: #334155; }

    #entity-search {
      margin: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 13px;
      color: #1e293b;
      outline: none;
      width: calc(100% - 20px);
    }
    body.dark #entity-search {
      background: #0f172a; border-color: #334155; color: #e2e8f0;
    }
    #entity-search:focus { border-color: #2563eb; }

    #entity-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 16px;
    }

    .entity-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entity-item:hover { background: #f1f5f9; color: #1e293b; }
    .entity-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
    body.dark .entity-item { color: #94a3b8; }
    body.dark .entity-item:hover { background: #334155; color: #e2e8f0; }
    body.dark .entity-item.active { background: rgba(37,99,235,0.15); color: #60a5fa; }

    #sidebar-footer {
      padding: 12px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    body.dark #sidebar-footer { border-color: #334155; }

    .sidebar-btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    .sidebar-btn:hover { background: #f1f5f9; }
    body.dark .sidebar-btn { background: #0f172a; border-color: #334155; color: #94a3b8; }
    body.dark .sidebar-btn:hover { background: #334155; }

    /* ── Main area ── */
    #main {
      margin-left: 240px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      color: #64748b;
    }
    body.no-sidebar #main { margin-left: 0; }

    #page-title { color: #1e293b; font-size: 28px; margin-bottom: 8px; font-weight: 700; }
    #page-subtitle { font-size: 15px; }
    #page-hint { margin-top: 16px; font-size: 13px; opacity: 0.55; }
    body.dark #page-title { color: #f1f5f9; }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.85);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }
    #login-overlay.visible { display: flex; }
    #login-box {
      background: #1e293b; border-radius: 14px; padding: 36px 32px;
      width: 340px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    #login-box h2 { color: #f1f5f9; margin: 0 0 6px; font-size: 20px; }
    #login-box p  { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    #login-box input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a;
      color: #f1f5f9; font-size: 14px; margin-bottom: 12px;
      outline: none; transition: border-color 0.15s;
    }
    #login-box input:focus { border-color: #2563eb; }
    #login-submit {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      background: #2563eb; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    #login-submit:hover { background: #1d4ed8; }
    #login-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    #login-err { color: #f87171; font-size: 13px; margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body class="dark">

  <!-- Login overlay (shown when no auth token) -->
  <div id="login-overlay">
    <div id="login-box">
      <h2>🦁 Leo Demo</h2>
      <p>Sign in with your Leo dashboard account to browse entities.</p>
      <input id="login-email"    type="email"    placeholder="Email" autocomplete="email" />
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="login-submit">Sign in</button>
      <div id="login-err"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">🦁 Leo Demo</div>
    <input id="entity-search" type="search" placeholder="Search entities…" />
    <div id="entity-list"></div>
    <div id="sidebar-footer">
      <button class="sidebar-btn" id="dark-toggle">☀️ Light mode</button>
      <button class="sidebar-btn" id="logout-btn" hidden>Sign out</button>
    </div>
  </div>

  <!-- Main content -->
  <div id="main">
    <div>
      <h1 id="page-title">Select an entity</h1>
      <p  id="page-subtitle">Choose a business from the sidebar to load its Leo widget.</p>
      <p  id="page-hint">The Leo widget will appear in the bottom-right corner.</p>
    </div>
  </div>

  <link rel="stylesheet" href="./chatbot.css" />

  <script>
    // ── Backend URL ──────────────────────────────────────────────────────────
    // When served from the backend (/demo/test.html), window.location.origin
    // IS the backend — no CORS friction, same-origin credentials.
    // When opened directly (file:// or Vite), fall back to localhost:3001.
    const BACKEND = (window.location.protocol === 'file:' || window.location.port === '5173')
      ? 'http://localhost:3001'
      : window.location.origin;

    window.LEO_BACKEND_URL = BACKEND;

    // ── Auth ─────────────────────────────────────────────────────────────────
    const TOKEN_KEY   = 'leo_access_token';
    const REFRESH_KEY = 'leo_refresh_token';
    function getToken()   { return localStorage.getItem(TOKEN_KEY); }
    function clearTokens() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(REFRESH_KEY);
    }

    // ── Entity state ─────────────────────────────────────────────────────────
    let allEntities    = [];
    let currentDomain  = null;

    // ── URL param shortcut (?domain=xxx bypasses auth entirely) ──────────────
    const urlDomain = new URLSearchParams(window.location.search).get('domain');

    // ── Widget lifecycle ─────────────────────────────────────────────────────
    function loadWidget(domain, name) {
      currentDomain = domain;

      // Remove existing widget
      const old = document.getElementById('leo-widget');
      if (old) old.remove();

      // Update page info
      if (name) document.getElementById('page-title').textContent = name;
      document.getElementById('page-subtitle').textContent = domain;
      document.getElementById('page-hint').textContent     = 'Widget loaded ↘';

      // Highlight active entity
      document.querySelectorAll('.entity-item').forEach(el => {
        el.classList.toggle('active', el.dataset.domain === domain);
      });

      // Inject chatbot script
      const script = document.createElement('script');
      script.src = './chatbot.js?v=' + Date.now();
      script.setAttribute('data-domain', domain);
      document.body.appendChild(script);
    }

    // ── Entity list ──────────────────────────────────────────────────────────
    function renderEntities(entities) {
      const list = document.getElementById('entity-list');
      list.innerHTML = '';
      entities.forEach(e => {
        const item = document.createElement('div');
        item.className = 'entity-item' + (e.domain === currentDomain ? ' active' : '');
        item.textContent = e.name || e.domain;
        item.dataset.domain = e.domain;
        item.addEventListener('click', () => loadWidget(e.domain, e.name));
        list.appendChild(item);
      });
    }

    document.getElementById('entity-search').addEventListener('input', function () {
      const q = this.value.toLowerCase();
      const filtered = allEntities.filter(e =>
        (e.name || '').toLowerCase().includes(q) || e.domain.toLowerCase().includes(q)
      );
      renderEntities(filtered);
    });

    // ── Load entities (requires auth) ────────────────────────────────────────
    async function loadEntities() {
      const token = getToken();
      if (!token) { showLogin(); return; }
      try {
        const res = await fetch(`${BACKEND}/api/dashboard/entities`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) { clearTokens(); showLogin(); return; }
        if (!res.ok) return;
        allEntities = await res.json();
        allEntities.sort((a, b) => (a.name || a.domain).localeCompare(b.name || b.domain));
        renderEntities(allEntities);
        document.getElementById('logout-btn').hidden = false;
      } catch {
        showLogin();
      }
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    function showLogin() {
      document.getElementById('login-overlay').classList.add('visible');
    }

    async function doLogin() {
      const btn  = document.getElementById('login-submit');
      const err  = document.getElementById('login-err');
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      err.textContent = '';
      btn.disabled = true;
      try {
        const res  = await fetch(`${BACKEND}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error || 'Login failed.'; return; }
        localStorage.setItem(TOKEN_KEY,   data.accessToken);
        localStorage.setItem(REFRESH_KEY, data.refreshToken);
        document.getElementById('login-overlay').classList.remove('visible');
        loadEntities();
      } catch {
        err.textContent = 'Could not reach the backend.';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('login-submit').addEventListener('click', doLogin);
    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('login-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', () => {
      clearTokens();
      allEntities = [];
      document.getElementById('entity-list').innerHTML = '';
      document.getElementById('logout-btn').hidden = true;
      const old = document.getElementById('leo-widget');
      if (old) old.remove();
      showLogin();
    });

    // ── Dark mode ─────────────────────────────────────────────────────────────
    const darkToggle = document.getElementById('dark-toggle');
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      darkToggle.textContent = document.body.classList.contains('dark')
        ? '☀️ Light mode' : '🌙 Dark mode';
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    if (urlDomain) {
      // URL param shortcut — no auth needed
      document.body.classList.add('no-sidebar');
      document.getElementById('page-title').textContent    = urlDomain;
      document.getElementById('page-subtitle').textContent = urlDomain;
      document.getElementById('page-hint').textContent     = 'Leo widget is in the bottom-right corner.';

      // Listen for chatbot.js to resolve the entity name (fires after its own history fetch)
      window.addEventListener('leo:entity-loaded', (e) => {
        if (e.detail.domain === urlDomain && e.detail.name) {
          document.getElementById('page-title').textContent = e.detail.name;
        }
      }, { once: true });

      loadWidget(urlDomain, null);
    } else {
      loadEntities();
    }
  </script>
</body>
</html>
