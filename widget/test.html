<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leo Widget Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }

    /* Tab bar */
    #entity-tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      background: #fff;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab {
      padding: 10px 20px;
      border: 1px solid #e2e8f0;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: #f1f5f9;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .tab:hover { background: #e2e8f0; }
    .tab.active {
      background: #fff;
      color: #1e293b;
      border-bottom: 2px solid #fff;
      margin-bottom: -2px;
    }

    /* Page content */
    #page-content {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 53px);
      text-align: center;
      color: #64748b;
      padding: 40px;
    }
    #page-title { color: #1e293b; font-size: 28px; margin-bottom: 8px; }
    #page-subtitle { font-size: 15px; }
    #page-hint { margin-top: 24px; font-size: 13px; opacity: 0.6; }

    /* Dark mode toggle */
    #dark-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #374151;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
    }
    body.dark { background: #0f172a; color: #e2e8f0; }
    body.dark #entity-tabs { background: #1e293b; border-color: #334155; }
    body.dark .tab { background: #1e293b; border-color: #334155; color: #94a3b8; }
    body.dark .tab:hover { background: #334155; }
    body.dark .tab.active { background: #0f172a; color: #f1f5f9; border-color: #334155; }
    body.dark #page-title { color: #f1f5f9; }
    body.dark #dark-toggle { background: #1e293b; border-color: #334155; color: #e2e8f0; }
  </style>
</head>
<body class="dark">

  <button id="dark-toggle">☀️ Light mode</button>
  <div id="entity-tabs"></div>

  <div id="page-content">
    <div>
      <h1 id="page-title"></h1>
      <p id="page-subtitle"></p>
      <p id="page-hint">Leo widget is in the bottom-right corner.</p>
    </div>
  </div>

  <link rel="stylesheet" href="./chatbot.css" />

  <script>
    const BACKEND = 'http://localhost:3001';
    window.LEO_BACKEND_URL = BACKEND;

    let currentDomain = null;

    function buildTabs(entities) {
      const tabBar = document.getElementById('entity-tabs');
      tabBar.innerHTML = '';
      entities.forEach((entity, i) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (i === 0 ? ' active' : '');
        tab.textContent = entity.name;
        tab.addEventListener('click', () => switchEntity(entity, tab));
        tabBar.appendChild(tab);
      });

      if (entities.length) switchEntity(entities[0], tabBar.firstChild, true);
    }

    function switchEntity(entity, activeTab, force = false) {
      if (!force && entity.domain === currentDomain) return;
      currentDomain = entity.domain;

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      activeTab.classList.add('active');

      document.getElementById('page-title').textContent = entity.name;
      document.getElementById('page-subtitle').textContent = entity.domain;

      const old = document.getElementById('leo-widget');
      if (old) old.remove();

      const script = document.createElement('script');
      script.src = './chatbot.js?v=' + Date.now();
      script.setAttribute('data-domain', entity.domain);
      document.body.appendChild(script);
    }

    async function loadEntities() {
      const token = localStorage.getItem('leo_access_token');
      if (token) {
        try {
          const res = await fetch(`${BACKEND}/api/dashboard/entities`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.ok) {
            const data = await res.json();
            if (data.length) { buildTabs(data); return; }
          }
        } catch { /* fall through to hint */ }
      }
      document.getElementById('page-title').textContent = 'No entities loaded';
      document.getElementById('page-subtitle').textContent = 'Log in to the dashboard first, then refresh this page.';
      document.getElementById('page-hint').textContent = '';
    }

    // Dark mode toggle
    const darkToggle = document.getElementById('dark-toggle');
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      darkToggle.textContent = document.body.classList.contains('dark') ? '☀️ Light mode' : '🌙 Dark mode';
    });

    loadEntities();
  </script>
</body>
</html>
